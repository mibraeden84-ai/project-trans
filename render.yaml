previews:
  generation: off

services:
  - type: web
    runtime: docker
    name: translink-file-library
    rootDir: "extracted/Translink file library/website"
    plan: free
    healthCheckPath: /healthz.php
    disk:
      name: uploads-data
      mountPath: /var/www/html/uploads
      sizeGB: 10
    envVars:
      - key: DB_DRIVER
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: translink-postgres
          property: connectionString
      - key: STORAGE_DRIVER
        value: local
      - key: DEBUG
        value: "false"
      - key: DB_PERSISTENT
        value: "true"
      - key: SEARCH_PAGE_SIZE
        value: "24"
      - key: ADMIN_TABLE_PAGE_SIZE
        value: "200"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: translink-postgres
    plan: free
    databaseName: translink_gps
    user: translink
    postgresMajorVersion: "18"
    diskSizeGB: 15
    storageAutoscalingEnabled: true
    ipAllowList: []
